el.innerHTML=`
<h2>👤 Member Detail</h2>
<div class="search-bar">
<input type="text" id="memSearch" placeholder="🔍 Search member name..." oninput="filterMembers()">
<select id="memChapFilter" onchange="filterMembers()"><option value="-1">All Chapters</option>${CH.map((c,i)=>`<option value="${i}">${c}</option>`).join('')}</select>
<button class="btn btn-outline" onclick="exportCSV()">📥 Export CSV</button>
</div>
<div class="tbl-wrap" style="max-height:70vh;overflow-y:auto"><table id="memTbl">
<thead><tr><th onclick="sortMem(-1)">Chapter <span class="arrow">⇅</span></th><th onclick="sortMem(0)">Member <span class="arrow">⇅</span></th>${COLS.map((c,i)=>`<th onclick="sortMem(${i+1})">${c} <span class="arrow">⇅</span></th>`).join('')}<th>Action</th></tr></thead>
<tbody id="memBody"></tbody>
</table></div>
<p style="color:#666;font-size:.78em;margin-top:8px" id="memCount"></p>`;
filterMembers();
}
function filterMembers(){
const search=(document.getElementById('memSearch')?.value||'').toLowerCase();
const chf=document.getElementById('memChapFilter')?.value||'-1';
let filtered=D.filter(r=>{
if(chf!=='-1'&&r[ci]!==parseInt(chf))return false;
if(search&&!r[ni].toLowerCase().includes(search)&&!CH[r[ci]].toLowerCase().includes(search))return false;
return true;
});
if(memberSort.col!==-2){
filtered.sort((a,b)=>{
let va,vb;
if(memberSort.col===-1){va=CH[a[ci]];vb=CH[b[ci]];return memberSort.dir*(va<vb?-1:va>vb?1:0)}
if(memberSort.col===0){va=a[ni].toLowerCase();vb=b[ni].toLowerCase();return memberSort.dir*(va<vb?-1:va>vb?1:0)}
va=a[memberSort.col+1];vb=b[memberSort.col+1];return memberSort.dir*(va-vb);
});
}
const body=document.getElementById('memBody');
if(!body)return;
body.innerHTML=filtered.map(r=>{
const gi=D.indexOf(r);
const badge=r[revi]>20000?'bg':r[revi]>5000?'by':'br';
return`<tr><td style="font-size:.78em;color:#CF2030">${CH[r[ci]]}</td><td style="font-weight:600">${r[ni]}</td><td>${r[pi]}</td><td>${r[ai]}</td><td>${r[li]}</td><td>${r[si]}</td><td>${r[vi]}</td><td>${r[rgi]}</td><td>${r[rri]}</td><td>${r[otoi]}</td><td>${r[tyi]}</td><td>${r[cei]}</td><td>${r[tri]}</td><td><span class="badge ${badge}">${fmt$(r[revi])}</span></td><td>${r[pti]}</td><td><button class="btn btn-sm" onclick="openEmail(${gi})">📧</button></td></tr>`;
}).join('');
const cnt=document.getElementById('memCount');
if(cnt)cnt.textContent=`Showing ${filtered.length} of ${D.length} members`;
}
function sortMem(col){
if(memberSort.col===col)memberSort.dir*=-1;
else{memberSort.col=col;memberSort.dir=col<=0?1:-1;}
filterMembers();
}
function renderAlerts(){
const el=document.getElementById('tab-alerts');
const highAbsence=D.filter(r=>r[ai]>=4).sort((a,b)=>b[ai]-a[ai]);
const zeroRefs=D.filter(r=>r[rgi]===0&&r[pi]>=5);
const zeroVisitors=D.filter(r=>r[vi]===0&&r[pi]>=10);
const zero121=D.filter(r=>r[otoi]===0&&r[pi]>=5);
const lowAttend=D.filter(r=>r[pi]<=5&&r[pi]>0);
el.innerHTML=`
<h2>⚠️ Coaching Alerts & Opportunities</h2>
<p style="color:#999;margin-bottom:16px">Members who may benefit from targeted coaching based on their PALMS metrics.</p>
<div class="cards">
<div class="card" style="border-top-color:#f44336"><div class="val" style="color:#f44336">${highAbsence.length}</div><div class="lbl">High Absences (4+)</div></div>
<div class="card" style="border-top-color:#ff9800"><div class="val" style="color:#ff9800">${zeroRefs.length}</div><div class="lbl">Zero Refs Given</div></div>
<div class="card" style="border-top-color:#2196f3"><div class="val" style="color:#2196f3">${zeroVisitors.length}</div><div class="lbl">Zero Visitors</div></div>
<div class="card" style="border-top-color:#9c27b0"><div class="val" style="color:#9c27b0">${zero121.length}</div><div class="lbl">Zero 1-to-1s</div></div>
<div class="card" style="border-top-color:#607d8b"><div class="val" style="color:#607d8b">${lowAttend.length}</div><div class="lbl">Low Attendance (≤5)</div></div>
</div>
<div class="chart-grid"><div class="chart-box"><h3>⚠️ Alerts Distribution by Chapter</h3><canvas id="ca1" height="300"></canvas></div>
<div class="chart-box"><h3>📊 Avg Revenue: Active vs Low-Engagement</h3><canvas id="ca2" height="300"></canvas></div></div>
${alertTable('🔴 High Absences (4+)',highAbsence,'These members have 4 or more absences. BNI policy allows 3 absences per 6-month period.')}
${alertTable('🟠 Zero Referrals Given (5+ meetings attended)',zeroRefs,'Members attending regularly but not yet giving referrals may need coaching on how to identify referral opportunities.')}
${alertTable('🔵 Zero Visitors Brought (10+ meetings)',zeroVisitors,'Bringing visitors is critical for chapter growth. These members could benefit from visitor invitation strategies.')}
${alertTable('🟣 Zero One-to-Ones (5+ meetings)',zero121,'One-to-ones are essential for building referral relationships. These members should prioritize scheduling them.')}
`;
const alertsByCh=CH.map((_,i)=>{const m=getChap(i);return{ha:m.filter(r=>r[ai]>=4).length,zr:m.filter(r=>r[rgi]===0&&r[pi]>=5).length,zv:m.filter(r=>r[vi]===0&&r[pi]>=10).length};});
const shortCH2=CH.map(c=>c.length>16?c.substring(0,14)+'…':c);
mkChart('ca1',{type:'bar',data:{labels:shortCH2,datasets:[
{label:'High Absences',data:alertsByCh.map(a=>a.ha),backgroundColor:'#f44336'},
{label:'Zero Refs Given',data:alertsByCh.map(a=>a.zr),backgroundColor:'#ff9800'},
{label:'Zero Visitors',data:alertsByCh.map(a=>a.zv),backgroundColor:'#2196f3'}
]},options:{responsive:true,plugins:{legend:{labels:{color:'#ccc',font:{size:10}}}},scales:{x:{ticks:{color:'#999',font:{size:9},maxRotation:45},grid:{color:'#222'},stacked:true},y:{ticks:{color:'#999'},grid:{color:'#222'},stacked:true}}}});
const activeMembers=D.filter(r=>r[pi]>=15&&r[rgi]>=3);
const lowEngMembers=D.filter(r=>r[pi]<10||r[rgi]===0);
const avgActive=activeMembers.length?Math.round(sumCol(activeMembers,revi)/activeMembers.length):0;
const avgLow=lowEngMembers.length?Math.round(sumCol(lowEngMembers,revi)/lowEngMembers.length):0;
mkChart('ca2',{type:'bar',data:{labels:['Active & Engaged','Low Engagement'],datasets:[{data:[avgActive,avgLow],backgroundColor:['#4caf50','#f44336'],borderRadius:6}]},options:{responsive:true,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#999',callback:v=>fmt$(v)},grid:{color:'#222'}},y:{ticks:{color:'#ccc',font:{size:12}},grid:{color:'#1a1a1a'}}}}});
}
function alertTable(title,arr,desc){
if(!arr.length)return`<h3>${title}</h3><p style="color:#4caf50;margin-bottom:16px">✅ No members in this category. Great job!</p>`;
return`<h3>${title}</h3><p style="color:#888;font-size:.82em;margin-bottom:8px">${desc}</p>
<div class="tbl-wrap" style="max-height:350px;overflow-y:auto"><table>
<thead><tr><th>Member</th><th>Chapter</th><th>Present</th><th>Absent</th><th>Visitors</th><th>Refs Given</th><th>1-to-1s</th><th>Revenue</th><th>Action</th></tr></thead>
<tbody>${arr.map(r=>{const gi=D.indexOf(r);return`<tr><td style="font-weight:600">${r[ni]}</td><td style="font-size:.78em;color:#999">${CH[r[ci]]}</td><td>${r[pi]}</td><td>${r[ai]}</td><td>${r[vi]}</td><td>${r[rgi]}</td><td>${r[otoi]}</td><td>${fmt$(r[revi])}</td><td><button class="btn btn-sm" onclick="openEmail(${gi})">📧 Coach</button></td></tr>`}).join('')}</tbody></table></div>`;
}
function generatePALMSCoaching(r){
const name=r[ni],ch=CH[r[ci]],pres=r[pi],abs=r[ai],lates=r[li],subs=r[si],vis=r[vi],rg=r[rgi],rr=r[rri],oto=r[otoi],ty=r[tyi],ce=r[cei],rev=r[revi];
let strengths=[],improvements=[];
if(pres>=20)strengths.push('Outstanding attendance — attending consistently is the #1 driver of BNI success.');
else if(pres>=15)strengths.push('Solid attendance record — keep showing up and the results will follow.');
if(rg>=10)strengths.push(`Impressive referral giving (${rg} referrals given)! Givers Gain® is alive and well.`);
if(oto>=10)strengths.push(`Great one-to-one activity (${oto})! Strong relationships fuel strong referrals.`);
if(rev>=20000)strengths.push(`Excellent revenue generation (${fmt$(rev)})! The BNI system is clearly working.`);
if(vis>=3)strengths.push(`Thank you for bringing ${vis} visitors — this is how chapters grow!`);
if(ty>=10)strengths.push(`Strong TYFCB numbers (${ty}) — closing business and acknowledging it builds trust.`);
if(abs>=4)improvements.push({area:'Attendance',tip:`With ${abs} absences, attendance improvement should be the top priority. BNI Policy allows 3 absences in a 6-month period. Consider:\n   • Setting a recurring, non-negotiable calendar block for meetings\n   • Sending a qualified substitute when unable to attend\n   • Communicating with the Membership Committee if facing challenges`});
if(rg<3)improvements.push({area:'Referrals Given',tip:`Only ${rg} referrals given this period. Remember: Givers Gain®! Techniques to increase referral giving:\n   • Schedule more one-to-ones to learn members' ideal referral triggers\n   • Review the member roster weekly and think "Who do I know that needs..."\n   • Set a personal goal of giving at least 1 referral per week\n   • Listen carefully during weekly presentations for referral opportunities`});
if(oto<3)improvements.push({area:'One-to-Ones',tip:`With only ${oto} one-to-one meetings, deepening relationships should be a focus. Techniques:\n   • Schedule at least 1-2 one-to-ones per week with different members\n   • Use the BNI GAINS profile exchange to learn about each member\n   • Ask great questions: "Who is your ideal client?" and "What are your referral triggers?"\n   • Follow up each one-to-one with a specific action item`});
if(vis<1&&pres>=10)improvements.push({area:'Visitor Invitations',tip:`No visitors brought yet. Visitors are the lifeblood of chapter growth. Techniques:\n   • Identify 3-5 professionals in your contact sphere to invite this month\n   • Use Higgins AI Visitor Invite tools to create compelling invitations\n   • Think of professionals who naturally complement your business\n   • Remember: the best visitors are people YOU would refer business to`});
if(ce===0&&pres>=10)improvements.push({area:'CEUs (Education)',tip:`No CEUs earned. Investing in BNI education makes you a stronger referral partner. Ways to earn CEUs:\n   • Listen to BNI Podcast episodes (4-5 episodes = 1 CEU)\n   • Watch BNI Business Builder videos (1 CEU per hour)\n   • Read BNI-approved books like "Networking Like a Pro"\n   • Attend BNI training events and workshops`});
if(rev===0&&pres>=10)improvements.push({area:'Revenue Generation',tip:`No revenue recorded. Focus on closing the referrals received and tracking business generated:\n   • Follow up promptly on every referral received (within 24 hours)\n   • Report all Thank You For Closed Business to keep momentum\n   • Ask referral partners to provide warm introductions, not just names\n   • Track and celebrate every closed deal in the chapter`});
let email=`Dear ${name},\n\nI hope this message finds you well! I'm reaching out regarding your PALMS report for the ${ch} chapter. Taking a moment to review our networking activity is a great way to identify opportunities for even greater success.\n\n`;
if(strengths.length){email+=`🌟 AREAS OF STRENGTH\n${strengths.map((s,i)=>`${i+1}. ${s}`).join('\n')}\n\n`;}
if(improvements.length){
email+=`📈 OPPORTUNITIES FOR GROWTH\n`;
improvements.forEach((imp,i)=>{email+=`\n${i+1}. ${imp.area.toUpperCase()}\n${imp.tip}\n`;});
email+='\n';
}
email+=`📊 YOUR CURRENT PALMS SNAPSHOT\n• Meetings Present: ${pres}  |  Absences: ${abs}  |  Lates: ${lates}\n• Visitors Brought: ${vis}\n• Referrals Given: ${rg}  |  Referrals Received: ${rr}\n• One-to-Ones: ${oto}  |  TYFCB: ${ty}\n• CEUs: ${ce}  |  Revenue: ${fmt$(rev)}\n\n`;
email+=`Remember, the PALMS system is designed to help every member succeed. Small, consistent improvements in each area create compounding results over time. The difference between good and great in BNI often comes down to just one more referral, one more one-to-one, or one more visitor per week.\n\nIf you have questions or would like to discuss strategies, please don't hesitate to reach out. We're all here to help each other succeed!\n\nGivers Gain®,\n\n[Your Name]\n[Your Chapter Role]\n${ch} · BNI CA Northern\n\n---\nGenerated by Higgins Reports · higgins.ai · support@higgins.ai`;
return email;
}
function openEmail(idx){
const r=D[idx];
const subject=`Your BNI PALMS Report Review — ${CH[r[ci]]} Chapter`;
const body=generatePALMSCoaching(r);
document.getElementById('emailTo').textContent=`To: ${r[ni]} · ${CH[r[ci]]}`;
document.getElementById('emailSubject').value=subject;
document.getElementById('emailBody').value=body;
document.getElementById('emailModal').classList.add('active');
}
function closeModal(){document.getElementById('emailModal').classList.remove('active')}
function sendEmail(){
const subj=encodeURIComponent(document.getElementById('emailSubject').value);
const body=encodeURIComponent(document.getElementById('emailBody').value);
window.open(`mailto:?subject=${subj}&body=${body}`,'_blank');
}
function copyEmail(){
const body=document.getElementById('emailBody').value;
const subj=document.getElementById('emailSubject').value;
navigator.clipboard.writeText(`Subject: ${subj}\n\n${body}`).then(()=>{
const btn=event.target;btn.textContent='✅ Copied!';setTimeout(()=>btn.textContent='📋 Copy',2000);
}).catch(()=>alert('Copy failed. Please select and copy manually.'));
}
function exportCSV(){
let csv='Chapter,Member,'+COLS.join(',')+'\n';
D.forEach(r=>{csv+=`"${CH[r[ci]]}","${r[ni]}",${r.slice(2).join(',')}\n`});
const blob=new Blob([csv],{type:'text/csv'});
const a=document.createElement('a');a.href=URL.createObjectURL(blob);
a.download='BNI_CA_Northern_PALMS_Feb2026.csv';a.click();
}
document.getElementById('emailModal').addEventListener('click',function(e){if(e.target===this)closeModal()});
renderRegion();
</script>
</body>
</html>
